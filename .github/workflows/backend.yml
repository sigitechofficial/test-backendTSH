name: CI/CD Workflow

on:
  push:
    branches:
      - testing # Automatically deploy on the test branch
  workflow_dispatch: # Manually deploy on the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: node:16.14.0

    steps:
      - uses: actions/checkout@v2

      - name: Cache node modules
        uses: actions/cache@v2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Transfer all files directly including node_modules
        uses: SamKirkland/FTP-Deploy-Action@v4.2.0
        with:
          server: ftp.theshippinghack.com
          username: ${{ secrets.TESTING_FTP_USERNAME }}
          password: ${{ secrets.TESTING_FTP_PASSWORD }}
          local-dir: ./ # Upload all files, including node_modules
          exclude: |
            .git*
            .github* # Exclude CI/CD configuration files if not needed

      - name: Verify deployment
        run: echo "Deployment completed successfully!"
