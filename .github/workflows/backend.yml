name: CI/CD Workflow

on:
  push:
    branches:
      - testing
  workflow_dispatch:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: node:16.14.0
    steps:
      - uses: actions/checkout@v2

      - name: Cache node modules
        uses: actions/cache@v2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Verify node_modules
        run: ls -l node_modules

      - name: Archive project for deployment
        run: zip -r build.zip ./*

  create_files_and_deploy_main:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      # Create .env file
      - name: Create .env file dynamically
        run: |
          echo "Creating .env file for production..."
          echo "${{ secrets.ENV_FILE_CONTENT_PROD }}" > .env

      # Create config.json
      - name: Create config.json file dynamically
        run: |
          mkdir -p config
          echo "${{ secrets.CONFIG_JSON_CONTENT }}" > config/config.json

      # Create .htaccess file
      - name: Create .htaccess file dynamically
        run: echo "${{ secrets.HTACCESS_CONTENT }}" > .htaccess

      # Deploy files to production
      - name: Sync files to production
        uses: SamKirkland/FTP-Deploy-Action@v4.2.0
        with:
          server: ftp.theshippinghack.com
          username: ${{ secrets.BACKEND_FTP_USERNAME }}
          password: ${{ secrets.BACKEND_FTP_PASSWORD }}

  create_files_and_deploy_testing:
    if: github.ref == 'refs/heads/testing'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      # Create .env file
      - name: Create .env file dynamically
        run: |
          echo "Creating .env file for testing..."
          echo "${{ secrets.ENV_FILE_CONTENT_STAGE }}" > .env

      # Create config.json
      - name: Create config.json file dynamically
        run: |
          mkdir -p config
          echo "${{ secrets.CONFIG_JSON_CONTENT }}" > config/config.json

      # Create .htaccess file
      - name: Create .htaccess file dynamically
        run: echo "${{ secrets.HTACCESS_CONTENT }}" > .htaccess

      # Deploy files to testing
      - name: Sync files to testing
        uses: SamKirkland/FTP-Deploy-Action@v4.2.0
        with:
          server: ftp.theshippinghack.com
          username: ${{ secrets.STAGE_FTP_USERNAME }}
          password: ${{ secrets.STAGE_FTP_PASSWORD }}