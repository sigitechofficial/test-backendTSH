name: CI/CD Workflow

on:
  push:
    branches:
      - testing # Automatically deploy on the test branch
  workflow_dispatch: # Manually deploy on the main branch

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: node:16.14.0

    steps:
      - uses: actions/checkout@v2

      - name: Cache node modules
        uses: actions/cache@v2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

  deploy:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: node:16.14.0

    steps:
      - uses: actions/checkout@v2

      - name: Install dependencies
        run: npm ci # Ensure dependencies are installed locally

      - name: Create .env file dynamically
        run: |
          echo "Creating .env file..."
          case "${{ github.ref }}" in
            "refs/heads/main")
              echo "Deploying to production server (main branch)..."
              echo "${{ secrets.ENV_FILE_CONTENT_PROD }}" > .env
              ;;
            "refs/heads/testing")
              echo "Deploying to testing server (testing branch)..."
              echo "${{ secrets.ENV_FILE_CONTENT_STAGE }}" > .env
              ;;
            *)
              echo "Invalid branch. Exiting."
              exit 1
              ;;
          esac

      - name: Sync files directly including node_modules
        uses: SamKirkland/FTP-Deploy-Action@v4.2.0
        with:
          server: ftp.theshippinghack.com
          username: ${{ secrets.TESTING_FTP_USERNAME }}
          password: ${{ secrets.TESTING_FTP_PASSWORD }}
          local-dir: ./ # Upload everything including node_modules
          exclude: |
            .git*
            .github*
            .env # Optionally exclude the .env file after syncing

      - name: Verify deployment
        run: echo "Deployment completed successfully!"
