name: CI/CD Workflow
on:
  push:
    branches:
      - testing
  workflow_dispatch:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: node:16.14.0
    steps:
      - uses: actions/checkout@v2
      - name: Cache node modules
        uses: actions/cache@v2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm i
  security_scan:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: node:16.14.0
    steps:
      - uses: actions/checkout@v2
      - name: Security Scan
        uses: zricethezav/gitleaks-action@v1.5.0
  deploy_main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: :lorry: Get latest code
        uses: actions/checkout@v2
      - name: :open_file_folder: Sync files to production
        uses: SamKirkland/FTP-Deploy-Action@v4.2.0
        with:
          server: ftp.theshippinghack.com
          username: ${{ secrets.BACKEND_FTP_USERNAME }}
          password: ${{ secrets.BACKEND_FTP_PASSWORD }}
  deploy_testing:
    if: github.ref == 'refs/heads/testing'
    runs-on: ubuntu-latest
    steps:
      - name: :lorry: Get latest code
        uses: actions/checkout@v2
      - name: :open_file_folder: Sync files to development
        uses: SamKirkland/FTP-Deploy-Action@v4.2.0
        with:
          server: ftp.theshippinghack.com
          username: ${{ secrets.STAGE_FTP_USERNAME }}
          password: ${{ secrets.STAGE_FTP_PASSWORD }}